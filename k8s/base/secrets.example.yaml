apiVersion: v1
kind: Secret
metadata:
  name: symphony-secrets
  namespace: symphony
type: Opaque
stringData:
  LINEAR_API_KEY: "lin_api_key_here"
  OPENAI_API_KEY: "sk-your-openai-key"
  SYMPHONY_WORKER_DRAIN_TOKEN: "replace-with-64-random-hex-characters-before-deploying"
---
apiVersion: v1
kind: Secret
metadata:
  name: symphony-orchestrator-ssh
  namespace: symphony
type: Opaque
stringData:
  id_ed25519: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    replace-with-orchestrator-private-key
    -----END OPENSSH PRIVATE KEY-----
  known_hosts: |
    symphony-worker-0.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-1.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-2.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-3.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-4.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-5.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-6.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-7.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-8.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
    symphony-worker-9.symphony-worker.symphony.svc.cluster.local ssh-ed25519 AAAA...
  config: |
    Host symphony-worker-*.symphony-worker.symphony.svc.cluster.local
      User symphony
      IdentityFile /home/symphony/.ssh/id_ed25519
      StrictHostKeyChecking yes
      UserKnownHostsFile /home/symphony/.ssh/known_hosts
---
apiVersion: v1
kind: Secret
metadata:
  name: symphony-worker-authorized-keys
  namespace: symphony
type: Opaque
stringData:
  authorized_keys: |
    ssh-ed25519 AAAA... your-orchestrator-public-key
---
apiVersion: v1
kind: Secret
metadata:
  name: symphony-worker-hostkeys
  namespace: symphony
type: Opaque
stringData:
  ssh_host_ed25519_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    replace-with-worker-host-private-key
    -----END OPENSSH PRIVATE KEY-----
  ssh_host_ed25519_key.pub: |
    ssh-ed25519 AAAA... worker-host-key
