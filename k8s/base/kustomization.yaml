apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: symphony

resources:
  - namespace.yaml
  - orchestrator-deployment.yaml
  - orchestrator-service.yaml
  - orchestrator-public-service.yaml
  - orchestrator-ingress.yaml
  - orchestrator-pdb.yaml
  - orchestrator-workspaces-pvc.yaml
  - worker-headless-service.yaml
  - worker-statefulset.yaml
  - worker-pdb.yaml
  - networkpolicy.yaml

configMapGenerator:
  - name: symphony-workflow
    files:
      - WORKFLOW.md=generated/skaffold/workflow/WORKFLOW.md

secretGenerator:
  - name: symphony-secrets
    envs:
      - generated/skaffold/secrets/symphony-secrets.env
  - name: symphony-orchestrator-ssh
    files:
      - id_ed25519=generated/skaffold/ssh/orchestrator_id_ed25519
      - known_hosts=generated/skaffold/ssh/known_hosts
      - config=generated/skaffold/ssh/config
  - name: symphony-worker-authorized-keys
    files:
      - authorized_keys=generated/skaffold/ssh/orchestrator_id_ed25519.pub
  - name: symphony-worker-hostkeys
    files:
      - ssh_host_ed25519_key=generated/skaffold/ssh/ssh_host_ed25519_key
      - ssh_host_ed25519_key.pub=generated/skaffold/ssh/ssh_host_ed25519_key.pub

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: symphony-orchestrator
    newName: nscr.io/k7qcltdhpncg0/symphony-k8s/orchestrator
    newTag: "20260711-3"
  - name: symphony-worker
    newName: nscr.io/k7qcltdhpncg0/symphony-k8s/worker
    newTag: "20260711-3"
