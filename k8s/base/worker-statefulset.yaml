apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: symphony-worker
  namespace: symphony
  labels:
    app: symphony-worker
spec:
  serviceName: symphony-worker
  replicas: 3
  selector:
    matchLabels:
      app: symphony-worker
  template:
    metadata:
      labels:
        app: symphony-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: symphony-worker
                topologyKey: kubernetes.io/hostname
            - weight: 75
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: symphony-orchestrator
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: symphony-worker
      initContainers:
        - name: init-workspace-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /srv/symphony/workspaces
              chown -R 10001:10001 /srv/symphony/workspaces
              chmod 2775 /srv/symphony/workspaces
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: workspaces
              mountPath: /srv/symphony/workspaces
        - name: init-worker-hostkeys
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /ssh-src/* /ssh-dst/
              chmod 600 /ssh-dst/ssh_host_ed25519_key
              chmod 644 /ssh-dst/ssh_host_ed25519_key.pub
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: worker-hostkeys-secret
              mountPath: /ssh-src
              readOnly: true
            - name: worker-hostkeys
              mountPath: /ssh-dst
      containers:
        - name: worker
          image: symphony-worker
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 22
          envFrom:
            - secretRef:
                name: symphony-secrets
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: workspaces
              mountPath: /srv/symphony/workspaces
            - name: worker-hostkeys
              mountPath: /etc/ssh/keys
              readOnly: true
            - name: worker-authorized-keys
              mountPath: /etc/ssh/authorized-keys/authorized_keys
              subPath: authorized_keys
              readOnly: true
      volumes:
        - name: worker-hostkeys-secret
          secret:
            secretName: symphony-worker-hostkeys
            defaultMode: 0600
            items:
              - key: ssh_host_ed25519_key
                path: ssh_host_ed25519_key
              - key: ssh_host_ed25519_key.pub
                path: ssh_host_ed25519_key.pub
        - name: worker-hostkeys
          emptyDir: {}
        - name: worker-authorized-keys
          secret:
            secretName: symphony-worker-authorized-keys
            defaultMode: 0400
            items:
              - key: authorized_keys
                path: authorized_keys
  volumeClaimTemplates:
    - metadata:
        name: workspaces
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
