apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: symphony-worker
  namespace: symphony
  labels:
    app: symphony-worker
spec:
  serviceName: symphony-worker
  replicas: 3
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: symphony-worker
  template:
    metadata:
      labels:
        app: symphony-worker
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: symphony-worker
              topologyKey: kubernetes.io/hostname
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 75
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: symphony-orchestrator
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: symphony-worker
      initContainers:
        - name: init-workspace-permissions
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /srv/symphony/workspaces
              mkdir -p /srv/worker-data/codex-home
              if [ ! -s /srv/worker-data/codex-home/auth.json ]; then
                cp /codex-auth/auth.json /srv/worker-data/codex-home/auth.json
              fi
              chown -R 10001:10001 /srv/worker-data/codex-home
              chmod 0700 /srv/worker-data/codex-home
              chmod 0600 /srv/worker-data/codex-home/auth.json
              chown -R 10001:10001 /srv/symphony/workspaces
              chmod 0777 /srv/symphony/workspaces
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: workspaces
              mountPath: /srv/symphony/workspaces
            - name: workspaces
              mountPath: /srv/worker-data
            - name: codex-chatgpt-auth
              mountPath: /codex-auth
              readOnly: true
        - name: init-worker-hostkeys
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /ssh-src/* /ssh-dst/
              chmod 600 /ssh-dst/ssh_host_ed25519_key
              chmod 644 /ssh-dst/ssh_host_ed25519_key.pub
              chmod 755 /ssh-dst
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: worker-hostkeys-secret
              mountPath: /ssh-src
              readOnly: true
            - name: worker-hostkeys
              mountPath: /ssh-dst
      containers:
        - name: worker
          image: symphony-worker
          imagePullPolicy: IfNotPresent
          ports:
            - name: ssh
              containerPort: 22
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - test -f /run/symphony-worker-ready && runuser -u symphony -- env HOME=/home/symphony codex login status 2>&1 | grep -Fq 'Logged in using ChatGPT'
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: ssh
            periodSeconds: 30
            failureThreshold: 3
          env:
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-secrets
                  key: LINEAR_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-machine-arrusted-symphony
                  key: token
          securityContext:
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: workspaces
              mountPath: /srv/symphony/workspaces
            - name: workspaces
              mountPath: /home/symphony/.codex
              subPath: codex-home
            - name: worker-hostkeys
              mountPath: /etc/ssh/keys
              readOnly: true
            - name: worker-authorized-keys
              mountPath: /etc/ssh/authorized-keys/authorized_keys
              subPath: authorized_keys
              readOnly: true
      volumes:
        - name: codex-chatgpt-auth
          secret:
            secretName: codex-chatgpt-auth
            defaultMode: 0400
            items:
              - key: auth.json
                path: auth.json
        - name: worker-hostkeys-secret
          secret:
            secretName: symphony-worker-hostkeys
            defaultMode: 0600
            items:
              - key: ssh_host_ed25519_key
                path: ssh_host_ed25519_key
              - key: ssh_host_ed25519_key.pub
                path: ssh_host_ed25519_key.pub
        - name: worker-hostkeys
          emptyDir: {}
        - name: worker-authorized-keys
          secret:
            secretName: symphony-worker-authorized-keys
            defaultMode: 0400
            items:
              - key: authorized_keys
                path: authorized_keys
  volumeClaimTemplates:
    - metadata:
        name: workspaces
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
