apiVersion: apps/v1
kind: Deployment
metadata:
  name: symphony-orchestrator
  namespace: symphony
  labels:
    app: symphony-orchestrator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: symphony-orchestrator
  template:
    metadata:
      labels:
        app: symphony-orchestrator
    spec:
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: symphony-worker
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: init-orchestrator-workspaces
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              mkdir -p /srv/symphony/workspaces
              chown -R 10001:10001 /srv/symphony/workspaces
              chmod 0777 /srv/symphony/workspaces
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: orchestrator-workspaces
              mountPath: /srv/symphony/workspaces
        - name: init-orchestrator-ssh
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /ssh-src/* /ssh-dst/
              chmod 600 /ssh-dst/id_ed25519
              chmod 644 /ssh-dst/known_hosts /ssh-dst/config
              chown -R 10001:10001 /ssh-dst
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: orchestrator-ssh-secret
              mountPath: /ssh-src
              readOnly: true
            - name: orchestrator-ssh
              mountPath: /ssh-dst
      containers:
        - name: orchestrator
          image: symphony-orchestrator
          imagePullPolicy: IfNotPresent
          args:
            - "eval"
            - "SymphonyElixir.CLI.main(System.argv())"
            - "--i-understand-that-this-will-be-running-without-the-usual-guardrails"
            - "--port"
            - "4001"
            - "./WORKFLOW.md"
          ports:
            - name: http
              containerPort: 4000
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
          envFrom:
            - secretRef:
                name: symphony-secrets
          env:
            - name: LANG
              value: C.UTF-8
            - name: ELIXIR_ERL_OPTIONS
              value: +fnu
          volumeMounts:
            - name: workflow
              mountPath: /app/WORKFLOW.md
              subPath: WORKFLOW.md
              readOnly: true
            - name: orchestrator-workspaces
              mountPath: /srv/symphony/workspaces
            - name: orchestrator-ssh
              mountPath: /home/symphony/.ssh
              readOnly: true
        - name: dashboard-proxy
          image: alpine/socat:1.8.0.3
          args:
            - TCP-LISTEN:4000,fork,reuseaddr
            - TCP:127.0.0.1:4001
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
      volumes:
        - name: workflow
          configMap:
            name: symphony-workflow
            items:
              - key: WORKFLOW.md
                path: WORKFLOW.md
        - name: orchestrator-ssh
          emptyDir: {}
        - name: orchestrator-ssh-secret
          secret:
            secretName: symphony-orchestrator-ssh
            defaultMode: 0400
        - name: orchestrator-workspaces
          persistentVolumeClaim:
            claimName: symphony-orchestrator-workspaces
