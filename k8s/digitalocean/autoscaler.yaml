apiVersion: v1
kind: ServiceAccount
metadata:
  name: symphony-autoscaler
  namespace: symphony
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: symphony-autoscaler
  namespace: symphony
rules:
  - apiGroups: ["apps"]
    resources: ["statefulsets/scale"]
    resourceNames: ["symphony-worker"]
    verbs: ["get", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: symphony-autoscaler
  namespace: symphony
subjects:
  - kind: ServiceAccount
    name: symphony-autoscaler
    namespace: symphony
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: symphony-autoscaler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: symphony-autoscaler
  namespace: symphony
  labels:
    app: symphony-autoscaler
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: symphony-autoscaler
  template:
    metadata:
      labels:
        app: symphony-autoscaler
    spec:
      serviceAccountName: symphony-autoscaler
      automountServiceAccountToken: true
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: autoscaler
          image: ghcr.io/jasonmorganson/symphony-k8s-autoscaler@sha256:b90c816a1274e78153158d573ed8238cf59356a924936e7ff34d631088ec78de
          imagePullPolicy: Always
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LINEAR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: symphony-secrets
                  key: LINEAR_API_KEY
            - name: LINEAR_PROJECT_SLUG
              value: arrusted-development-71c3d9986f6d
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-machine-arrusted-symphony
                  key: token
            - name: REQUESTER_POLICY_PATH
              value: /etc/symphony-workflow/requester-policy.json
            - name: APPROVAL_HANDOFF_RETRY_SECONDS
              value: "300"
            - name: SYMPHONY_WORKER_DRAIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: symphony-secrets
                  key: SYMPHONY_WORKER_DRAIN_TOKEN
            - name: MIN_WORKERS
              value: "1"
            - name: MAX_WORKERS
              value: "10"
            - name: AGENTS_PER_WORKER
              value: "1"
            - name: POLL_INTERVAL_SECONDS
              value: "60"
            - name: SCALE_DOWN_COOLDOWN_SECONDS
              value: "1200"
            - name: TRACKER_DEMAND_MAX_AGE_SECONDS
              value: "300"
            - name: USAGE_LEDGER_PATH
              value: /var/lib/symphony-metrics/usage.json
          ports:
            - name: metrics
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            periodSeconds: 15
            failureThreshold: 4
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: usage-ledger
              mountPath: /var/lib/symphony-metrics
            - name: workflow
              mountPath: /etc/symphony-workflow
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: usage-ledger
          persistentVolumeClaim:
            claimName: symphony-usage-ledger
        - name: workflow
          configMap:
            name: symphony-workflow
            items:
              - key: requester-policy.json
                path: requester-policy.json
---
apiVersion: v1
kind: Service
metadata:
  name: symphony-autoscaler
  namespace: symphony
spec:
  selector:
    app: symphony-autoscaler
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: symphony-usage-ledger
  namespace: symphony
spec:
  storageClassName: do-block-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
