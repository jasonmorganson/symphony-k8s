apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: symphony-worker
  namespace: symphony
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "2"
              memory: 4Gi
            limits:
              cpu: "4"
              memory: 6Gi
  volumeClaimTemplates:
    - metadata:
        name: workspaces
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: do-block-storage
        resources:
          requests:
            storage: 20Gi
