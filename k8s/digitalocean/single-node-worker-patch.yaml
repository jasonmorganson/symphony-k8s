apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: symphony-worker
  namespace: symphony
spec:
  replicas: 1
  volumeClaimTemplates:
    - metadata:
        name: workspaces
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
