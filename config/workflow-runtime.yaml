tracker:
  kind: linear
  api_key: $LINEAR_API_KEY
  project_slug: arrusted-development-71c3d9986f6d
  active_states:
    - Todo
    - In Progress
    - Merging
    - Rework
  terminal_states:
    - Closed
    - Cancelled
    - Canceled
    - Duplicate
    - Done
polling:
  interval_ms: 60000
workspace:
  root: /srv/symphony/workspaces
worker:
  ssh_hosts:
    - symphony-worker-0.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-1.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-2.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-3.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-4.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-5.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-6.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-7.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-8.symphony-worker.symphony.svc.cluster.local
    - symphony-worker-9.symphony-worker.symphony.svc.cluster.local
  max_concurrent_agents_per_host: 1
  drain_state_path: /srv/symphony/workspaces/.worker-drains.json
hooks:
  after_create: |
    exec /usr/local/bin/bootstrap-arrusted-workspace "$PWD"
  before_remove: |
    if command -v wt >/dev/null 2>&1; then
      wt hook post-remove --yes || echo "wt post-remove hook not configured; skipping." >&2
    fi
agent:
  max_concurrent_agents: 10
  max_turns: 20
  max_concurrent_agents_by_state:
    Merging: 1
codex:
  command: codex --config shell_environment_policy.inherit=all --config model_reasoning_effort=medium --config agents.max_threads=3 --model gpt-5.6 app-server
  approval_policy: never
  thread_sandbox: danger-full-access
  turn_sandbox_policy:
    type: dangerFullAccess
