Port 22
Protocol 2
HostKey /etc/ssh/keys/ssh_host_ed25519_key

PermitRootLogin no
PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
UsePAM no
PubkeyAuthentication yes

AuthorizedKeysFile /home/symphony/.ssh/authorized_keys
AllowUsers symphony

# Make Git attribution authoritative for every Symphony SSH session. These
# server-set values override client-supplied environment variables and local
# repository config cannot override Git's GIT_* identity variables.
SetEnv GIT_AUTHOR_NAME=autograph-symphony GIT_AUTHOR_EMAIL=jason+symphony@withgraph.com GIT_COMMITTER_NAME=autograph-symphony GIT_COMMITTER_EMAIL=jason+symphony@withgraph.com

X11Forwarding no
AllowTcpForwarding no
PermitTunnel no
PrintMotd no
PidFile /run/sshd.pid
