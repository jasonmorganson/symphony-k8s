name: Publish Symphony images

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - docker/**
      - autoscaler/**
      - docker/worker/**
      - k8s/**
      - tests/**
      - .github/workflows/publish-images.yml

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Test autoscaler
        run: PYTHONPATH=autoscaler python3 -m unittest -v autoscaler/test_scaler.py
      - name: Test worker authentication
        run: bash tests/test-worker-auth.sh
      - name: Test workspace bootstrap
        run: bash tests/test-workspace-bootstrap.sh
      - name: Test workflow cost controls
        run: bash tests/test-workflow-cost-controls.sh
      - name: Build images
        run: |
          docker build -t symphony-runtime-base:do -f docker/runtime-base/Dockerfile .
          docker build -t symphony-release:do -f docker/release/Dockerfile .
          docker build \
            --build-arg RUNTIME_BASE=symphony-runtime-base:do \
            --build-arg SYMPHONY_RELEASE_IMAGE=symphony-release:do \
            -t ghcr.io/jasonmorganson/symphony-k8s-orchestrator:${GITHUB_SHA} \
            -f docker/orchestrator/Dockerfile .
          docker build \
            --build-arg RUNTIME_BASE=symphony-runtime-base:do \
            -t ghcr.io/jasonmorganson/symphony-k8s-worker:${GITHUB_SHA} \
            -t ghcr.io/jasonmorganson/symphony-k8s-worker:20260712-chatgpt \
            -f docker/worker/Dockerfile .
          docker run --rm --entrypoint gh \
            ghcr.io/jasonmorganson/symphony-k8s-worker:${GITHUB_SHA} --version
          docker build \
            -t ghcr.io/jasonmorganson/symphony-k8s-autoscaler:${GITHUB_SHA} \
            -f docker/autoscaler/Dockerfile .
      - name: Push images
        run: |
          docker push ghcr.io/jasonmorganson/symphony-k8s-orchestrator:${GITHUB_SHA}
          docker push ghcr.io/jasonmorganson/symphony-k8s-worker:20260712-chatgpt
          docker push ghcr.io/jasonmorganson/symphony-k8s-worker:${GITHUB_SHA}
          docker push ghcr.io/jasonmorganson/symphony-k8s-autoscaler:${GITHUB_SHA}
