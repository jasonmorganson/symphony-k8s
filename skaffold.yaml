apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: symphony-k8s
build:
  local:
    push: false
  artifacts:
    - image: symphony-runtime-base
      context: .
      docker:
        dockerfile: docker/runtime-base/Dockerfile
    - image: symphony-release
      context: .
      docker:
        dockerfile: docker/release/Dockerfile
    - image: symphony-orchestrator
      context: .
      requires:
        - image: symphony-runtime-base
          alias: RUNTIME_BASE
        - image: symphony-release
          alias: SYMPHONY_RELEASE_IMAGE
      docker:
        dockerfile: docker/orchestrator/Dockerfile
    - image: symphony-worker
      context: .
      requires:
        - image: symphony-runtime-base
          alias: RUNTIME_BASE
      docker:
        dockerfile: docker/worker/Dockerfile
manifests:
  kustomize:
    paths:
      - k8s/base
  hooks:
    before:
      - host: &generate-config
          command:
            - bash
            - scripts/generate-skaffold-inputs.sh
deploy:
  kubectl:
    defaultNamespace: symphony
    hooks:
      before:
        - host: *generate-config
portForward:
  - resourceType: service
    resourceName: symphony-orchestrator
    namespace: symphony
    port: 4000
    localPort: 4000
profiles:
  - name: dev
    activation:
      - command: dev
    build:
      local:
        push: false
  - name: prod
    build:
      local:
        push: true
    deploy:
      kubectl:
        flags:
          apply:
            - --prune=false
