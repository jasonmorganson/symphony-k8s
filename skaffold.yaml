apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: symphony-k8s
build:
  local:
    push: false
  artifacts:
    - image: symphony-orchestrator
      context: .
      docker:
        dockerfile: docker/orchestrator.Dockerfile
    - image: symphony-worker
      context: .
      docker:
        dockerfile: docker/worker.Dockerfile
manifests:
  kustomize:
    paths:
      - k8s/base
  hooks:
    before:
      - host: &generate-config
          command:
            - python3
            - -c
            - |
              import os
              import subprocess
              import textwrap
              from pathlib import Path

              required = ["LINEAR_API_KEY", "OPENAI_API_KEY", "LINEAR_PROJECT_SLUG", "REPO_URL"]
              missing = [name for name in required if not os.environ.get(name)]
              if missing:
                  raise SystemExit(f"Missing required environment variables: {', '.join(missing)}")

              root = Path("k8s/base/generated/skaffold")
              workflow_dir = root / "workflow"
              secrets_dir = root / "secrets"
              ssh_dir = root / "ssh"
              workflow_dir.mkdir(parents=True, exist_ok=True)
              secrets_dir.mkdir(parents=True, exist_ok=True)
              ssh_dir.mkdir(parents=True, exist_ok=True)

              orchestrator_key = ssh_dir / "orchestrator_id_ed25519"
              worker_host_key = ssh_dir / "ssh_host_ed25519_key"

              if not orchestrator_key.exists():
                  subprocess.run(
                      ["ssh-keygen", "-t", "ed25519", "-N", "", "-f", str(orchestrator_key), "-C", "symphony-orchestrator"],
                      check=True,
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )

              if not worker_host_key.exists():
                  subprocess.run(
                      ["ssh-keygen", "-t", "ed25519", "-N", "", "-f", str(worker_host_key), "-C", "symphony-worker-host"],
                      check=True,
                      stdout=subprocess.DEVNULL,
                      stderr=subprocess.DEVNULL,
                  )

              host_pub_parts = worker_host_key.with_suffix(".pub").read_text().strip().split(None, 2)
              if len(host_pub_parts) < 2:
                  raise SystemExit("Invalid worker host public key material")
              host_key_type, host_key_body = host_pub_parts[:2]

              (ssh_dir / "known_hosts").write_text(
                  textwrap.dedent(
                      f"""\
                      symphony-worker-0.symphony-worker.symphony.svc.cluster.local {host_key_type} {host_key_body}
                      symphony-worker-1.symphony-worker.symphony.svc.cluster.local {host_key_type} {host_key_body}
                      symphony-worker-2.symphony-worker.symphony.svc.cluster.local {host_key_type} {host_key_body}
                      """
                  ).lstrip()
              )

              (ssh_dir / "config").write_text(
                  textwrap.dedent(
                      """\
                      Host symphony-worker-*.symphony-worker.symphony.svc.cluster.local
                        User symphony
                        IdentityFile /home/symphony/.ssh/id_ed25519
                        StrictHostKeyChecking yes
                        UserKnownHostsFile /home/symphony/.ssh/known_hosts
                      """
                  ).lstrip()
              )

              (secrets_dir / "symphony-secrets.env").write_text(
                  f"LINEAR_API_KEY={os.environ['LINEAR_API_KEY']}\nOPENAI_API_KEY={os.environ['OPENAI_API_KEY']}\n"
              )

              (workflow_dir / "WORKFLOW.md").write_text(
                  textwrap.dedent(
                      f"""\
                      ---
                      tracker:
                        kind: linear
                        project_slug: {os.environ['LINEAR_PROJECT_SLUG']}
                        api_key: $LINEAR_API_KEY

                      workspace:
                        root: /srv/symphony/workspaces

                      worker:
                        ssh_hosts:
                          - symphony-worker-0.symphony-worker.symphony.svc.cluster.local
                          - symphony-worker-1.symphony-worker.symphony.svc.cluster.local
                          - symphony-worker-2.symphony-worker.symphony.svc.cluster.local
                        max_concurrent_agents_per_host: 2

                      agent:
                        max_concurrent_agents: 6
                        max_turns: 20

                      codex:
                        command: /usr/local/bin/codex app-server

                      hooks:
                        after_create: |
                          set -euo pipefail
                          git clone {os.environ['REPO_URL']} repo
                          cd repo
                          if [ -f package-lock.json ]; then
                            npm ci
                          elif [ -f pnpm-lock.yaml ]; then
                            corepack enable && pnpm install --frozen-lockfile
                          elif [ -f yarn.lock ]; then
                            corepack enable && yarn install --frozen-lockfile
                          fi
                      ---

                      # Symphony Workflow

                      Update `tracker.project_slug` and clone URL placeholders before production use.
                      """
                  ).lstrip()
              )
deploy:
  kubectl:
    defaultNamespace: symphony
    hooks:
      before:
        - host: *generate-config
profiles:
  - name: dev
    activation:
      - command: dev
    build:
      local:
        push: false
  - name: prod
    build:
      local:
        push: true
    deploy:
      kubectl:
        flags:
          apply:
            - --prune=false
