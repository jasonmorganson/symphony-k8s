apiVersion: skaffold/v4beta11
kind: Config
metadata:
  name: symphony-k8s
build:
  local:
    push: false
  artifacts:
    - image: symphony-orchestrator
      context: .
      docker:
        dockerfile: docker/orchestrator.Dockerfile
    - image: symphony-worker
      context: .
      docker:
        dockerfile: docker/worker.Dockerfile
manifests:
  kustomize:
    paths:
      - k8s/base
  hooks:
    before:
      - host: &generate-config
          command:
            - bash
            - scripts/generate-skaffold-inputs.sh
deploy:
  kubectl:
    defaultNamespace: symphony
    hooks:
      before:
        - host: *generate-config
profiles:
  - name: dev
    activation:
      - command: dev
    build:
      local:
        push: false
  - name: prod
    build:
      local:
        push: true
    deploy:
      kubectl:
        flags:
          apply:
            - --prune=false
